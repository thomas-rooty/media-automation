- VPN & Téléchargements:

    - qBittorrent:
        icon: qbittorrent
        href: http://{{HOMEPAGE_VAR_HOST}}:{{HOMEPAGE_VAR_QBIT_PORT}}
        description: Client torrent via VPN
        server: my-docker
        container: qbittorrent
        widget:
          type: qbittorrent
          url: http://gluetun:{{HOMEPAGE_VAR_QBIT_PORT}}
          username: ""
          password: ""

    - Gluetun:
        icon: gluetun
        description: VPN AirVPN (WireGuard)
        server: my-docker
        container: gluetun
        widget:
          type: gluetun
          url: http://gluetun:8000

- Indexers:

    - Prowlarr:
        icon: prowlarr
        href: http://{{HOMEPAGE_VAR_HOST}}:9696
        description: Gestionnaire d'indexeurs
        server: my-docker
        container: prowlarr
        widget:
          type: prowlarr
          url: http://prowlarr:9696
          key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"

    - FlareSolverr:
        icon: flaresolverr
        description: Résolution CAPTCHA / Cloudflare
        server: my-docker
        container: flaresolverr

