- Média:

    - Jellyfin:
        icon: jellyfin
        href: http://{{HOMEPAGE_VAR_HOST}}:8096
        description: Serveur multimédia
        server: my-docker
        container: jellyfin
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
          enableBlocks: true
          enableNowPlaying: true

    - Jellyseerr:
        icon: jellyseerr
        href: http://{{HOMEPAGE_VAR_HOST}}:5055
        description: Requêtes de médias
        server: my-docker
        container: jellyseerr
        widget:
          type: jellyseerr
          url: http://jellyseerr:5055
          key: "{{HOMEPAGE_VAR_JELLYSEERR_KEY}}"

- Outils:

    - Portainer:
        icon: portainer
        href: http://{{HOMEPAGE_VAR_HOST}}:9000
        description: Gestion Docker
        server: my-docker
        container: portainer
        widget:
          type: portainer
          url: https://portainer:9443
          env: 2
          key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"

    - Watchtower:
        icon: watchtower
        description: Mise à jour automatique des conteneurs
        server: my-docker
        container: watchtower
