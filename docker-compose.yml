services:

  # =========================
  # VPN (AirVPN + Auto Rotation)
  # =========================

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun

    cap_add:
      - NET_ADMIN

    devices:
      - /dev/net/tun:/dev/net/tun

    env_file:
      - .env

    environment:

      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=wireguard

      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY:-}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY:-}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY:-}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES:-}
      - WIREGUARD_MTU=${WIREGUARD_MTU:-1320}

      # serveur autorisés
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-Netherlands}

      # rotation auto serveur
      - VPN_ENDPOINT_IP_ROTATION=on
      - VPN_ENDPOINT_IP_ROTATION_PERIOD=24h

      # firewall kill switch
      - FIREWALL=on
      - FIREWALL_VPN_INPUT_PORTS=${AIRVPN_PORT_FORWARD:-6881}

      # API HTTP interne utilisée par le dashboard. Ne pas publier le port 8000.
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - 'HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE={"auth":"none"}'

      - TZ=${TZ:-Europe/Paris}

    volumes:
      - ./config/gluetun:/gluetun

    ports:
      - ${WEBUI_PORT:-8080}:${WEBUI_PORT:-8080}
      - ${AIRVPN_PORT_FORWARD:-6881}:${AIRVPN_PORT_FORWARD:-6881}
      - ${AIRVPN_PORT_FORWARD:-6881}:${AIRVPN_PORT_FORWARD:-6881}/udp

    restart: unless-stopped

    healthcheck:
      test: ping -c 1 1.1.1.1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - vpn-network
      - arr-network

  # =========================
  # qBittorrent
  # =========================

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent

    network_mode: "service:gluetun"

    depends_on:
      gluetun:
        condition: service_healthy

    env_file:
      - .env

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}

      - WEBUI_PORT=${WEBUI_PORT:-8080}
      - TORRENTING_PORT=${AIRVPN_PORT_FORWARD:-6881}

    volumes:
      - ./config/qbittorrent:/config
      - /mnt/medias:/data
      - /mnt/medias2:/data2

    restart: unless-stopped

  # =========================
  # Indexers
  # =========================

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr

    dns:
      - 1.1.1.1
      - 1.0.0.1

    networks:
      - arr-network

    ports:
      - 9696:9696

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}

    volumes:
      - ./config/prowlarr:/config

    restart: unless-stopped

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr

    networks:
      - arr-network

    expose:
      - "8191"

    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-Europe/Paris}

    restart: unless-stopped

  # =========================
  # ARR
  # =========================

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr

    networks:
      - arr-network

    dns:
      - 1.1.1.1
      - 1.0.0.1

    ports:
      - 8989:8989

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}

    volumes:
      - ./config/sonarr:/config
      - /mnt/medias:/data
      - /mnt/medias2:/data2

    restart: unless-stopped

  sonarr_private:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr_private

    networks:
      - arr-network

    dns:
      - 1.1.1.1
      - 1.0.0.1

    ports:
      - 8990:8989

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}

    volumes:
      - ./config/sonarr_private:/config
      - /mnt/medias:/data
      - /mnt/medias2:/data2

    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr

    networks:
      - arr-network

    dns:
      - 1.1.1.1
      - 1.0.0.1

    ports:
      - 7878:7878

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}

    volumes:
      - ./config/radarr:/config
      - /mnt/medias:/data
      - /mnt/medias2:/data2

    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr

    networks:
      - arr-network

    ports:
      - 6767:6767

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}

    volumes:
      - ./config/bazarr:/config

    restart: unless-stopped

  # =========================
  # Media
  # =========================

  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: jellyseerr

    networks:
      - media-network
      - arr-network

    ports:
      - 5055:5055

    volumes:
      - ./config/jellyseerr:/app/config

    restart: unless-stopped

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin

    networks:
      - media-network

    ports:
      - 8096:8096

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Paris}

    volumes:
      - ./config/jellyfin:/config
      - /mnt/medias/Medias/Movies:/movies
      - /mnt/medias/Medias/Series:/series
      - /mnt/medias2/Medias/Movies:/movies2
      - /mnt/medias2/Medias/Series:/series2

    restart: unless-stopped

  # =========================
  # Tools
  # =========================

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer

    networks:
      - media-network

    ports:
      - 9443:9443
      - 9000:9000

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/portainer:/data

    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower

    networks:
      - media-network

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400

    restart: unless-stopped

  # =========================
  # Dashboard CapyFlix
  # =========================

  dashboard:
    build:
      context: ./dashboard
    container_name: capyflix-dashboard

    networks:
      - vpn-network
      - arr-network
      - media-network

    ports:
      - ${DASHBOARD_PORT:-3000}:8000

    environment:
      DASH_TITLE: ${DASH_TITLE:-CapyFlix}
      DASH_REFRESH_SECONDS: ${DASH_REFRESH_SECONDS:-30}
      DASH_SONARR_URL: http://sonarr:8989
      DASH_SONARR_API_KEY: ${SONARR_API_KEY:-}
      DASH_SONARR_PRIVATE_URL: http://sonarr_private:8989
      DASH_SONARR_PRIVATE_API_KEY: ${SONARR_PRIVATE_API_KEY:-}
      DASH_RADARR_URL: http://radarr:7878
      DASH_RADARR_API_KEY: ${RADARR_API_KEY:-}
      DASH_PROWLARR_URL: http://prowlarr:9696
      DASH_PROWLARR_API_KEY: ${PROWLARR_API_KEY:-}
      DASH_BAZARR_URL: http://bazarr:6767
      DASH_BAZARR_API_KEY: ${BAZARR_API_KEY:-}
      DASH_FLARESOLVERR_URL: http://flaresolverr:8191
      DASH_QBITTORRENT_URL: http://gluetun:${WEBUI_PORT:-8080}
      DASH_QBITTORRENT_USERNAME: ${QBIT_USER:-admin}
      DASH_QBITTORRENT_PASSWORD: ${QBIT_PASS:-adminadmin}
      DASH_JELLYFIN_URL: http://jellyfin:8096
      DASH_JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-}
      DASH_JELLYFIN_USER_ID: ${JELLYFIN_USER_ID:-}
      DASH_JELLYSEERR_URL: http://jellyseerr:5055
      DASH_JELLYSEERR_API_KEY: ${JELLYSEERR_API_KEY:-}
      DASH_PORTAINER_URL: http://portainer:9000
      DASH_GLUETUN_URL: http://gluetun:8000
      DASH_WEATHER_LAT: ${WEATHER_LAT:-}
      DASH_WEATHER_LON: ${WEATHER_LON:-}
      DASH_WEATHER_LABEL: ${WEATHER_LABEL:-}
      DASH_DISKS_JSON: '[{"label":"Médias 1","path":"/mnt/medias"},{"label":"Médias 2","path":"/mnt/medias2"}]'

    volumes:
      - dashboard-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/medias:/mnt/medias:ro
      - /mnt/medias2:/mnt/medias2:ro

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    networks:
      - arr-network
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped

# =========================
# Volumes & networks
# =========================

volumes:
  dashboard-data:

networks:

  vpn-network:
    driver: bridge

  arr-network:
    driver: bridge

  media-network:
    driver: bridge
