services:

# =========================
# VPN (AirVPN + Auto Rotation)
# =========================

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun

    cap_add:
      - NET_ADMIN

    devices:
      - /dev/net/tun:/dev/net/tun

    env_file:
      - .env

    environment:

      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=wireguard

      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - WIREGUARD_MTU=${WIREGUARD_MTU}

      # serveur autorisés
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}

      # rotation auto serveur
      - VPN_ENDPOINT_IP_ROTATION=on
      - VPN_ENDPOINT_IP_ROTATION_PERIOD=24h

      # firewall kill switch
      - FIREWALL=on
      - FIREWALL_VPN_INPUT_PORTS=${AIRVPN_PORT_FORWARD}

      # API HTTP pour le widget Homepage (auth désactivée, réseau interne uniquement)
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - HTTP_CONTROL_SERVER_USERNAME=
      - HTTP_CONTROL_SERVER_PASSWORD=

      - TZ=${TZ}

    volumes:
      - ./config/gluetun:/gluetun

    ports:
      - ${WEBUI_PORT}:${WEBUI_PORT}
      - ${AIRVPN_PORT_FORWARD}:${AIRVPN_PORT_FORWARD}
      - ${AIRVPN_PORT_FORWARD}:${AIRVPN_PORT_FORWARD}/udp

    restart: unless-stopped

    healthcheck:
      test: ping -c 1 1.1.1.1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - vpn-network
      - arr-network


# =========================
# qBittorrent
# =========================

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent

    network_mode: "service:gluetun"

    depends_on:
      gluetun:
        condition: service_healthy

    env_file:
      - .env

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

      - WEBUI_PORT=${WEBUI_PORT}
      - TORRENTING_PORT=${AIRVPN_PORT_FORWARD}

    volumes:
      - ./config/qbittorrent:/config
      - /mnt/medias/torrents:/downloads

    restart: unless-stopped


# =========================
# Indexers
# =========================

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr

    networks:
      - arr-network

    ports:
      - 9696:9696

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - ./config/prowlarr:/config

    restart: unless-stopped


  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr

    networks:
      - arr-network

    expose:
      - "8191"

    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}

    restart: unless-stopped


# =========================
# ARR
# =========================

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr

    networks:
      - arr-network

    ports:
      - 8989:8989

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - ./config/sonarr:/config
      - /mnt/medias/torrents:/downloads
      - /mnt/medias/Medias/Series:/series

    restart: unless-stopped

  sonarr_private:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr_private

    networks:
      - arr-network

    ports:
      - 8990:8989

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - ./config/sonarr_private:/config
      - /mnt/medias/torrents:/downloads

      - /mnt/medias/Medias/Series_private:/series

    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr

    networks:
      - arr-network

    ports:
      - 7878:7878

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - ./config/radarr:/config
      - /mnt/medias/torrents:/downloads
      - /mnt/medias/Medias/Movies:/movies

    restart: unless-stopped


  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr

    networks:
      - arr-network

    ports:
      - 6767:6767

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - ./config/bazarr:/config
      - /mnt/medias/Medias/Movies:/movies
      - /mnt/medias/Medias/Series:/series

    restart: unless-stopped


# =========================
# Media
# =========================

  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: jellyseerr

    networks:
      - media-network
      - arr-network

    ports:
      - 5055:5055

    volumes:
      - ./config/jellyseerr:/app/config

    restart: unless-stopped


  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin

    networks:
      - media-network

    ports:
      - 8096:8096

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - ./config/jellyfin:/config
      - /mnt/medias/Medias/Movies:/movies
      - /mnt/medias/Medias/Series:/series

    restart: unless-stopped


# =========================
# Tools
# =========================

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer

    networks:
      - media-network

    ports:
      - 9443:9443
      - 9000:9000

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/portainer:/data

    restart: unless-stopped


  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower

    networks:
      - media-network

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400

    restart: unless-stopped


# =========================
# Dashboard (Homepage)
# =========================

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage

    networks:
      - vpn-network
      - arr-network
      - media-network

    ports:
      - 3000:3000

    environment:
      - TZ=${TZ}

      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS}

      - HOMEPAGE_VAR_HOST=${SERVER_IP:-localhost}
      - HOMEPAGE_VAR_QBIT_PORT=${WEBUI_PORT}
      - HOMEPAGE_VAR_QBIT_USER=${QBIT_USER:-admin}
      - HOMEPAGE_VAR_QBIT_PASS=${QBIT_PASS}

      - HOMEPAGE_VAR_PROWLARR_KEY=${PROWLARR_API_KEY}
      - HOMEPAGE_VAR_SONARR_KEY=${SONARR_API_KEY}
      - HOMEPAGE_VAR_SONARR_PRIVATE_KEY=${SONARR_PRIVATE_API_KEY}
      - HOMEPAGE_VAR_RADARR_KEY=${RADARR_API_KEY}
      - HOMEPAGE_VAR_BAZARR_KEY=${BAZARR_API_KEY}
      - HOMEPAGE_VAR_JELLYFIN_KEY=${JELLYFIN_API_KEY}
      - HOMEPAGE_VAR_JELLYSEERR_KEY=${JELLYSEERR_API_KEY}

    volumes:
      - ./config/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

    restart: unless-stopped


# =========================
# Networks
# =========================

networks:

  vpn-network:
    driver: bridge

  arr-network:
    driver: bridge

  media-network:
    driver: bridge