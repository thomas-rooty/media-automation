services:
  salon-dashboard:
    build:
      # le chemin est relatif à CE fichier (dashboard/...)
      context: .
    container_name: salon-dashboard
    ports:
      - "8008:8000"
    env_file:
      # Copie `dashboard/dashboard.env.example` -> `dashboard/dashboard.env`
      - ./dashboard.env
    # Pour afficher les disques externes dans /api/system, monte ici les mêmes points de montage
    # que sur ton serveur (en lecture seule si tu veux).
    volumes:
      # ton disque externe (lsblk -> /mnt/medias)
      - ${MEDIA_MOUNT_PATH:-/mnt/medias}:/mnt/medias:ro
      # persistance des données internes (historique réseau, etc.)
      - dashboard-data:/data
    networks:
      - arr-network
      - media-network
    restart: unless-stopped

volumes:
  dashboard-data:

# Réseaux créés par le docker-compose.yml principal (media-automation/).
# Par défaut Docker Compose les préfixe avec le nom du projet (= nom du dossier).
networks:
  arr-network:
    external: true
    name: ${COMPOSE_PROJECT:-media-automation}_arr-network
  media-network:
    external: true
    name: ${COMPOSE_PROJECT:-media-automation}_media-network
